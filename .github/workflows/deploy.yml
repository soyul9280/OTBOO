name: Deploy Spring Application (Springboot Application to AWS ECS)
on:
  push:
    branches:
      - dev
  workflow_dispatch:  # 수동 실행

# 공통 환경 변수
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
  ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
  ECR_NGINX_REPOSITORY_URI: ${{ vars.ECR_NGINX_REPOSITORY_URI }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  run-on-deploy-branch:
    if: github.ref == 'refs/heads/dev' || startsWith(github.head_ref, 'deploy/')
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test
      WEATHER_INFO_API_URL: ${{ secrets.WEATHER_INFO_API_URL }}
      WEATHER_INFO_SERVICE_KEY: ${{ secrets.WEATHER_INFO_SERVICE_KEY }}
      LOCATION_API_URL: ${{ secrets.LOCATION_API_URL }}
      LOCATION_API_KEY: ${{ secrets.LOCATION_API_KEY }}
      KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
      KAFKA_CLUSTER_API_KEY: ${{ secrets.KAFKA_CLUSTER_API_KEY }}
      KAFKA_CLUSTER_API_SECRET: ${{ secrets.KAFKA_CLUSTER_API_SECRET }}

    steps:
      - name: Echo branch name
        run: echo "Running because head_ref is ${{ github.head_ref }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

  docker-build-and-push: # AWS Credentials 및 ECR 로그인 - # Docker Build 및 ECR에 Push
    runs-on: ubuntu-latest
    needs: run-on-deploy-branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials # AWS 자격 증명
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build Docker Image (x86_64)
        run: |
          docker build \
            --build-arg PROJECT_NAME=weatherwear \
            --build-arg PROJECT_VERSION=0.0.1 \
            -t $ECR_REPOSITORY_URI:latest \
            -t $ECR_REPOSITORY_URI:$IMAGE_TAG \
            .

      - name: Push Docker Image to ECR (latest / github.sha)
        run: |
          docker push $ECR_REPOSITORY_URI:latest
          docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
          echo "image=$ECR_REPOSITORY_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

  docker-build-and-push-nginx: # NGINX 이미지 Build 및 ECR에 Push
    runs-on: ubuntu-latest
    needs: run-on-deploy-branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR Public
        uses: docker/login-action@v3
        with:
          registry: public.ecr.aws
          username: ${{ secrets.AWS_ACCESS_KEY }}
          password: ${{ secrets.AWS_SECRET_KEY }}
        env:
          AWS_REGION: us-east-1   # override

      - name: Build and push NGINX image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ECR_NGINX_REPOSITORY_URI }}:latest
            ${{ env.ECR_NGINX_REPOSITORY_URI }}:${{ env.IMAGE_TAG }}

  ecs-deploy: # ECS 배포
    needs: [ docker-build-and-push, docker-build-and-push-nginx ]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale down ECS service to 0 # ECS 서비스 일시 중단
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --desired-count 0

      - name: Wait for tasks to stop  # 기존 태스크가 완전히 종료될 때까지 기다리기
        run: |
          while aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE \
            --desired-status RUNNING \
            --query 'taskArns' --output text | grep -q .; do
            echo "Waiting for old tasks to stop..."
            sleep 30
          done

      - name: Get current ECS task definition # task-definition.json 파일 받기
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query 'taskDefinition' \
            > task-definition.json

      - name: Update images in task definition for backend and nginx  # task-definition.json 파일 수정하여 new-task-definition.json 생성
        run: |
          jq \
            --arg backend_image "${{ env.ECR_REPOSITORY_URI }}:latest" \
            --arg nginx_image "${{ env.ECR_NGINX_REPOSITORY_URI }}:latest" '
            .containerDefinitions |= map(
              if .name == "backend" then .image = $backend_image
              elif .name == "otboo-nginx" then .image = $nginx_image
              else . end
            ) 
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )' task-definition.json > new-task-definition.json

      - name: Register new task definition  # 수정된 task definition 등록
        id: register-task-def
        run: |
          new_task_def_arn=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text | tr -d '\n\r')
          echo "task_definition_arn=$new_task_def_arn" >> $GITHUB_OUTPUT

      - name: Deploy Amazon ECS task definition  # 새 태스크 정의 배포
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ./new-task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Scale up ECS service to 1 # ECS 서비스 재시작
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --desired-count 1

      - name: Clean up temporary task files
        if: always()
        run: |
          rm -f task-definition.json new-task-definition.json
