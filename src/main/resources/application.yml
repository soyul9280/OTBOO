spring:
  application:
    name: ${PROJECT_NAME:weatherwear}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      enabled: true

  jackson:
    time-zone: Asia/Seoul

  lifecycle:
    timeout-per-shutdown-phase: 10s

  config:
    import: optional:file:.env[.properties]
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_REST_API_KEY}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  batch:
    job:
      enabled: false    # 수동 실행만 진행

  cache:
    type: caffeine

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: weatherwear
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: SASL_SSL
      sasl:
        jaas:
          config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_CLUSTER_API_KEY}' password='${KAFKA_CLUSTER_API_SECRET}';
        mechanism: PLAIN
    topics:
      new-follower: weatherwear.new_follower
      cloth-attribute-added: weatherwear.cloth_attribute_added
      cloth-attribute-updated: weatherwear.cloth_attribute_updated
      direct-message-received: weatherwear.direct_message_received
      feed-like: weatherwear.feed_like
      new-feed-comment: weatherwear.new_feed_comment
      followee-feed-posted: weatherwear.followee_feed_posted
      role-changed: weatherwear.role_changed
      weather-alert: weatherwear.weather_alert

server:
  shutdown: graceful
  forward-headers-strategy: framework

weather:
  api-url: ${WEATHER_INFO_API_URL}
  api-service-key: ${WEATHER_INFO_SERVICE_KEY}
  batch:
    chunk-size: 100

location:
  api-url: ${LOCATION_API_URL}
  api-key: ${LOCATION_API_KEY}

jwt:
  issuer: weatherwear
  access-token:
    validity-seconds: 900 # 15분
  refresh-token:
    validity-seconds: 2592000 # 30일
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}

resetpassword:
  validity-seconds: 600 # 10분

sse:
  event-queue-capacity: ${SSE_EVENT_QUEUE_CAPACITY:1000}
  timeout: ${SSE_TIMEOUT:300000}


app:
  admin:
    email: ${ADMIN_INITIAL_EMAIL}
    name: ${ADMIN_INITIAL_NAME}
    password: ${ADMIN_INITIAL_PASSWORD}

weatherwear:
  storage:
    type: s3
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL}

clothes:
  extraction:
    musinsa:
      image-url-prefix: ${MUSINSA_IMAGE_URL_PREFIX}