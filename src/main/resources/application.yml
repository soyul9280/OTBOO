spring:
  application:
    name: weatherwear

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      enabled: true

  jackson:
    time-zone: Asia/Seoul

  lifecycle:
    timeout-per-shutdown-phase: 30s

  config:
    import: optional:file:.env[.properties]
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_REST_API_KEY}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id


server:
  shutdown: graceful

weather:
  api-url: ${WEATHER_INFO_API_URL}
  api-service-key: ${WEATHER_INFO_SERVICE_KEY}

location:
  api-url: ${LOCATION_API_URL}
  api-key: ${LOCATION_API_KEY}

jwt:
  issuer: weatherwear
  access-token:
    validity-seconds: 900 # 15분
  refresh-token:
    validity-seconds: 2592000 # 30일
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}

time:
  zone-id: ${TIME_ZONE_ID:Asia/Seoul}


resetpassword:
  validity-seconds: 600 # 10분

sse:
  event-queue-capacity: ${SSE_EVENT_QUEUE_CAPACITY:1000}
  timeout: ${SSE_TIMEOUT:300000}

weatherwear:
  storage:
    type: s3
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION}
