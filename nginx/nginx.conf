# nginx/nginx.conf
# Nginx 의 전역 설정 파일

user nginx; # nginx 사용자로 실행 (보안 고려)
worker_processes auto;  # CPU 코어 수에 맞춰 자동 설정
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid; # 프로세스 ID 파일 위치

events {
    worker_connections 1024;  # 워커당 최대 연결 수
    use epoll;  # Linux에서 효율적인 이벤트 모델
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 로그 포맷 정의
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr ' # 어느 백엔드 서버로 갔는지
                    'upstream_response_time: $upstream_response_time'; # 응답 시간

    access_log /var/log/nginx/access.log main; # 액세스 로그 설정

    # 성능 최적화 설정
    sendfile on; # 커널 레벨 파일 전송 > 빠름
    tcp_nopush on; # 패킷 크기 최적화
    tcp_nodelay on; # 작은 패킷도 즉시 전송 옵션
    keepalive_timeout 65;
    types_hash_max_size 2048; # MIME 타입 해시 테이블 크기

    # Gzip 압축
    gzip on; # 압축 활성화
    gzip_vary on; # Accept-Encoding 헤더 추가
    gzip_types text/plain text/css application/json application/javascript;

    # 추가 설정 파일 포함
    include /etc/nginx/conf.d/*.conf;
}
